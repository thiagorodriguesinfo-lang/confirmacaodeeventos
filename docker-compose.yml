services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: confirmacaodeeventos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/confirmacaodeeventos?schema=public
    ports:
      - '3000:3000'
    volumes:
      # Imagens de convite enviadas pelo painel — persistidas fora da imagem,
      # senao seriam perdidas a cada novo deploy (rebuild recria o container).
      - uploads_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  dispatch-worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/confirmacaodeeventos?schema=public
      # Sessao do WhatsApp embutido (Baileys) persistida em volume — o socket
      # vive somente aqui, no worker. Sobrevive a reinicios sem reescanear o QR.
      BAILEYS_AUTH_DIR: /app/baileys-auth
    volumes:
      - baileys_auth:/app/baileys-auth
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  baileys_auth:
  uploads_data:
